name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Check API syntax
        run: python -c "import py_compile; py_compile.compile('backend/api.py', doraise=True)"

      - name: Check Scraper syntax
        run: python -c "import py_compile; py_compile.compile('backend/scraper.py', doraise=True)"

      - name: Check Vercel API syntax
        run: python -c "import py_compile; py_compile.compile('api/index.py', doraise=True)"
